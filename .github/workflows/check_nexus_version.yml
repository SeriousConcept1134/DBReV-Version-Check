name: Check Nexus version

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest Nexus version + changelog
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: python scripts_ci/fetch_nexus_version.py

      - name: Commit version.json if changed
        run: |
          if git diff --quiet -- version.json; then
            echo "No changes to version.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "Update version.json"
          git push
